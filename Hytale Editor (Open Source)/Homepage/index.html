<!DOCTYPE html> 
<html>
 <head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">    
  <link href="../Fonts/fonts.css" rel="stylesheet" type="text/css"/>  
  <link href="index.css" rel="stylesheet" type="text/css"/> 
  <script src="index.js" type="text/javascript"></script>
  <title>Hytale Editor</title>  
 </head>
 <body> 
  <main>  
   <Topbar>
    <Titlebar>
     <button id="MenuScreenToggle">
      <img src="../src/Images/Homepage/Menu.png" alt=""/> 
     </button>  
     <p>Hytale Editor</p>
    </Titlebar>
    <Searchbar>
     <Search>
      <img src="../src/Images/Homepage/Search.png" alt=""/>
      <input type="text" name="Search" value="" placeholder="Search Projects" />
     </Search>
    </Searchbar>
    <Toolbar>
     <button Tool="Notifications"></button>
     <div></div>
     <button Tool="Profile"></button>
     <button Tool="Config"></button>
    </Toolbar> 
   </Topbar>
   <mainboard>
    <Menubar id="MenuScreen">
     <section namespace="General"> 
      <button nt='Dashboard'>
       <backface></backface>   
       <p>Dashboard</p>
      </button> 
      <button nt='Projects'>
       <backface></backface>   
       <p>Projects</p>
      </button> 
     </section>
    </Menubar>
    <dashboard> 
     <panel panel="Projects"> 
      
     </panel> 
    </dashboard>
   </mainboard>
  </main>
 </body>
</html>
